<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>鬥氣 MOBILE - 終極穩定版</title>
    <style>
        /* 1. 核心頁面設置：禁止所有預設手勢 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            /* 禁止所有觸控手勢（包括縮放） */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            position: fixed; /* 防止橡皮筋回彈效果 */
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        /* 2. 標題 */
        .header h1 {
            font-size: 1.8rem;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
            margin: 0;
            font-style: italic;
            text-transform: uppercase;
        }

        /* 3. 鬥氣槽區域 */
        .battle-container {
            width: 90%;
            max-width: 500px;
        }

        .names {
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            margin-bottom: 5px;
            font-style: italic;
        }
        .cpu-n { color: #ff3333; }
        .ply-n { color: #33aaff; }

        .bar-frame {
            width: 100%;
            height: 40px;
            background: #222;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #comp-fill {
            position: absolute;
            left: 0;
            height: 100%;
            background: linear-gradient(to right, #800, #f22);
            width: 50%;
            transition: width 0.05s ease-out;
        }

        #ply-fill {
            position: absolute;
            right: 0;
            height: 100%;
            background: linear-gradient(to left, #008, #2af);
            width: 50%;
            transition: width 0.05s ease-out;
        }

        #clash-spark {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #fff;
            box-shadow: 0 0 15px 5px #fff, 0 0 20px 10px #ffcc00;
            z-index: 10;
            transform: translateX(-50%);
            left: 50%;
            transition: left 0.05s ease-out;
        }

        /* 4. 控制區 */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #tap-zone {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #4facfe 0%, #007bff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border: 10px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.4);
            transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }

        #tap-zone:active {
            transform: scale(0.9);
            background: radial-gradient(circle, #007bff 0%, #4facfe 100%);
        }

        #msg {
            font-size: 3rem;
            font-weight: 900;
            height: 60px;
            font-style: italic;
        }

        .win-text { color: #33aaff; text-shadow: 0 0 20px #33aaff; }
        .lose-text { color: #ff3333; text-shadow: 0 0 20px #ff3333; }

        .retry-btn {
            padding: 10px 30px;
            background: #333;
            color: #eee;
            border: 1px solid #666;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Power Clash</h1>
    </div>

    <div class="battle-container">
        <div class="names">
            <span class="cpu-n">CPU</span>
            <span class="ply-n">YOU</span>
        </div>
        <div class="bar-frame">
            <div id="comp-fill"></div>
            <div id="ply-fill"></div>
            <div id="clash-spark"></div>
        </div>
    </div>

    <div id="msg"></div>

    <div class="controls">
        <div id="tap-zone">TAP!!!</div>
        <button class="retry-btn" onclick="resetGame()">RESET</button>
    </div>

<script>
    // --- 遊戲邏輯變數 ---
    let pos = 50; 
    let active = false;
    let cpuTimer;

    const plyPower = 4.2; // 玩家點擊威力
    const cpuPower = 2.8; // 電腦點擊威力
    const cpuInterval = 150; // 電腦點擊速度 (ms)

    const compFill = document.getElementById('comp-fill');
    const plyFill = document.getElementById('ply-fill');
    const spark = document.getElementById('clash-spark');
    const msgArea = document.getElementById('msg');
    const tapZone = document.getElementById('tap-zone');

    // --- 核心防縮放邏輯 (針對 iOS Safari 優化) ---
    document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    let lastClick = 0;
    document.addEventListener('touchend', (e) => {
        let now = Date.now();
        if (now - lastClick <= 300) e.preventDefault();
        lastClick = now;
    }, false);

    // --- 遊戲運作 ---
    function update() {
        spark.style.left = pos + "%";
        compFill.style.width = pos + "%";
        plyFill.style.width = (100 - pos) + "%";

        if (pos <= 0) endGame("WIN");
        if (pos >= 100) endGame("LOSE");
    }

    // 使用 pointerdown 確保手機反應最快
    tapZone.addEventListener('pointerdown', (e) => {
        if (!active) return;
        pos -= plyPower;
        if (pos < 0) pos = 0;
        update();
    });

    function cpuCycle() {
        if (!active) return;
        pos += cpuPower;
        if (pos > 100) pos = 100;
        update();
        cpuTimer = setTimeout(cpuCycle, cpuInterval);
    }

    function endGame(res) {
        active = false;
        clearTimeout(cpuTimer);
        if (res === "WIN") {
            msgArea.innerHTML = '<span class="win-text">YOU WIN!</span>';
        } else {
            msgArea.innerHTML = '<span class="lose-text">K.O.</span>';
        }
    }

    function resetGame() {
        pos = 50;
        active = true;
        msgArea.innerHTML = "";
        update();
        clearTimeout(cpuTimer);
        // 給玩家 1 秒準備時間
        setTimeout(cpuCycle, 1000);
    }

    // 初始化啟動
    resetGame();
</script>

</body>
</html>
